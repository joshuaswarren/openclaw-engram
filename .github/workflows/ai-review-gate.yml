name: AI Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  ai-reviewers:
    if: >-
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for AI reviewers on push events
        if: github.event_name == 'pull_request'
        run: |
          echo "Waiting 3 minutes for AI reviewers to analyse the diff..."
          sleep 180

      - name: Check AI review bot activity
        uses: actions/github-script@v7
        env:
          REQUIRED_AI_REVIEWER_GROUPS: >-
            kilo-code-bot[bot]|kilo-code-bot|kiloconnect[bot]|kilo[bot]|kiloconnect|kilo,
            codex[bot]|openai-codex[bot]|codex-reviewer[bot]|chatgpt-codex-connector|chatgpt-codex-connector[bot],
            cursor-bugbot[bot]|cursor[bot]|cursor-bugbot|cursor
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Resolve PR number — all supported events include pull_request.
            const pr = context.payload.pull_request?.number;
            if (!pr) {
              core.setFailed('Unable to determine pull request number.');
              return;
            }

            const groupsRaw = process.env.REQUIRED_AI_REVIEWER_GROUPS || '';
            const groups = groupsRaw
              .split(',')
              .map(s => s.trim())
              .filter(Boolean)
              .map(group => group.split('|').map(x => x.trim().toLowerCase()).filter(Boolean));

            if (groups.length === 0) {
              core.setFailed('No required AI reviewer groups configured.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: Number(pr),
              per_page: 100,
            });

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: Number(pr),
              per_page: 100,
            });

            const prComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: Number(pr),
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login?.toLowerCase();
              if (!login) continue;
              latestByUser.set(login, review.state);
            }
            for (const comment of [...issueComments, ...prComments]) {
              const login = comment.user?.login?.toLowerCase();
              if (!login) continue;
              if (!latestByUser.has(login)) latestByUser.set(login, "COMMENTED");
            }

            const present = [];
            const missing = [];

            for (const group of groups) {
              const matched = group.find(alias => latestByUser.has(alias));
              if (matched) {
                present.push({ group, matched, state: latestByUser.get(matched) });
              } else {
                missing.push(group);
              }
            }

            core.info(`Found review activity from: ${present.map(p => `${p.matched}(${p.state})`).join(', ') || 'none'}`);

            if (present.length === 0) {
              const expected = groups.map(group => group.join(' OR ')).join('; ');
              core.setFailed(`No required AI review activity found. Expected one of: ${expected}`);
              return;
            }

            if (missing.length > 0) {
              const missingText = missing.map(group => group.join(' OR ')).join('; ');
              core.warning(`Some AI reviewer groups have not reported yet: ${missingText}`);
            }

            core.notice('AI review gate satisfied (at least one required AI reviewer group reported activity).');
