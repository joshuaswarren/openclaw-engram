name: Changelog Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  changelog-guard:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate changelog workflow expectations
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const labels = (context.payload.pull_request.labels || []).map(l => (l.name || '').toLowerCase());
            if (labels.includes('skip-changelog')) {
              core.notice('skip-changelog label present; skipping changelog guard.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changed = files.map(f => f.filename);
            const changelogTouched = changed.includes('CHANGELOG.md');

            if (!changelogTouched) {
              core.notice('CHANGELOG.md is release-workflow owned; no PR changelog edit required.');
              return;
            }

            const changelogFile = files.find(f => f.filename === 'CHANGELOG.md');
            const patch = changelogFile?.patch || '';
            const touchedReleaseSection =
              patch.includes('## [Unreleased]') ||
              /## \[v?\d+\.\d+\.\d+/.test(patch);

            if (!touchedReleaseSection) {
              core.setFailed(
                'CHANGELOG.md was edited directly, but the diff does not update `## [Unreleased]` or a versioned release section. Keep normal PRs out of CHANGELOG.md, or edit the actual release section intentionally.',
              );
              return;
            }

            core.notice('CHANGELOG.md edited directly in a release section; changelog guard passed.');
