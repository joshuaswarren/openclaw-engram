name: Hermes Python CI

on:
  pull_request:
    paths:
      - "packages/plugin-hermes/**"
  push:
    branches: [main]
    paths:
      - "packages/plugin-hermes/**"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/plugin-hermes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Type check
        run: pip install mypy && mypy engram_hermes/ --ignore-missing-imports

      - name: Lint
        run: pip install ruff && ruff check engram_hermes/

      - name: Tests
        run: pip install pytest && pytest tests/ -v

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/plugin-hermes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Check if version already published
        id: check
        run: |
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if pip index versions engram-hermes 2>/dev/null | grep -q "$VERSION"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.check.outputs.published != 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/plugin-hermes/dist/
