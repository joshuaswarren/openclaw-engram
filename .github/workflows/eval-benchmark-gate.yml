name: Eval Benchmark Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  eval-benchmark-gate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          path: candidate

      - name: Checkout base
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Prepare push baseline
        if: github.event_name == 'push'
        run: cp -R candidate base

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: pnpm
          cache-dependency-path: candidate/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: candidate
        run: pnpm install --frozen-lockfile

      - name: Compare eval snapshots
        working-directory: candidate
        run: |
          BASE_DIR="../base/tests/fixtures/eval-ci/store"
          CANDIDATE_DIR="./tests/fixtures/eval-ci/store"
          SNAPSHOT_ID="required-main"
          if [ ! -d "$BASE_DIR" ] || [ ! -d "$CANDIDATE_DIR" ]; then
            echo "No eval snapshot fixture store found in base or candidate checkout; skipping."
            exit 0
          fi
          pnpm exec tsx scripts/eval-baseline-ci-gate.ts --base "$BASE_DIR" --candidate "$CANDIDATE_DIR" --snapshot-id "$SNAPSHOT_ID"
